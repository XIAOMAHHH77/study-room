<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自习室 · 内测邀请</title>
<style>
  :root {
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --success: #6ee7b7;
    --error: #fca5a5;
    --accent: #818cf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #080810;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 渐变光晕背景 */
  .glow-bg {
    position: fixed; inset: 0;
    overflow: hidden;
    z-index: 0;
  }
  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .glow-orb:nth-child(1) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(129,140,248,0.6), transparent);
    top: -200px; left: -100px;
    animation-delay: 0s;
  }
  .glow-orb:nth-child(2) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(110,231,183,0.4), transparent);
    bottom: -150px; right: -100px;
    animation-delay: -7s;
  }
  .glow-orb:nth-child(3) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(192,132,252,0.35), transparent);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -14s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(40px, -30px); }
    50% { transform: translate(-20px, 20px); }
    75% { transform: translate(-30px, -10px); }
  }
  .glow-orb:nth-child(3) { animation: orbCenter 25s ease-in-out infinite; }
  @keyframes orbCenter {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    33% { transform: translate(-45%, -55%) scale(1.15); }
    66% { transform: translate(-55%, -45%) scale(0.9); }
  }

  /* 粒子网格 */
  .dot-grid {
    position: fixed; inset: 0;
    z-index: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  }

  /* 主卡片 */
  .container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 460px;
  }

  .card {
    background: rgba(15,15,30,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    padding: 48px 40px 36px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    transition: height 0.5s ease;
  }

  /* 顶部装饰线 */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--success), transparent);
    border-radius: 0 0 3px 3px;
  }

  .brand {
    text-align: center;
    margin-bottom: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    opacity: 0.7;
  }

  .title {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    color: #fff;
  }

  .subtitle {
    text-align: center;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 32px;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  /* 输入 */
  .field {
    margin-bottom: 16px;
  }
  .field-label {
    display: block;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
  }
  .field-input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: #fff;
    font-size: 0.95rem;
    font-family: inherit;
    letter-spacing: 0.04em;
    outline: none;
    transition: all 0.25s;
  }
  .field-input:focus {
    border-color: rgba(129,140,248,0.4);
    background: rgba(129,140,248,0.06);
    box-shadow: 0 0 20px rgba(129,140,248,0.08);
  }
  .field-input::placeholder { color: rgba(255,255,255,0.15); }

  .field-error {
    font-size: 0.7rem;
    color: var(--error);
    margin-top: 5px;
    display: none;
    letter-spacing: 0.03em;
  }
  .field-error.show { display: block; }

  .field-success {
    text-align: center;
    font-size: 0.82rem;
    color: var(--success);
    margin-top: 10px;
    display: none;
    letter-spacing: 0.04em;
  }
  .field-success.show { display: block; }

  /* 邀请码输入 — 独立数字框 */
  .invite-code-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .invite-digit {
    width: 48px; height: 56px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #fff;
    font-size: 1.4rem;
    font-weight: 300;
    text-align: center;
    font-family: inherit;
    letter-spacing: 0.05em;
    outline: none;
    transition: all 0.25s;
    caret-color: var(--success);
  }
  .invite-digit:focus {
    border-color: rgba(129,140,248,0.5);
    background: rgba(129,140,248,0.08);
    box-shadow: 0 0 16px rgba(129,140,248,0.1);
  }
  .invite-digit.filled { border-color: rgba(129,140,248,0.3); }

  /* 按钮 */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, rgba(129,140,248,0.2), rgba(110,231,183,0.1));
    border: 1px solid rgba(129,140,248,0.2);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.08em;
    outline: none;
    margin-top: 4px;
    transition: all 0.25s;
  }
  .btn:hover {
    background: linear-gradient(135deg, rgba(129,140,248,0.3), rgba(110,231,183,0.15));
    border-color: rgba(129,140,248,0.4);
    box-shadow: 0 4px 20px rgba(129,140,248,0.15);
  }
  .btn:active { transform: scale(0.98); }

  .switch-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 0.76rem;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .switch-link:hover { color: rgba(255,255,255,0.6); }

  .invite-hint {
    text-align: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.18);
    margin-top: 24px;
    letter-spacing: 0.06em;
  }

  /* 过渡动画 */
  .step-enter {
    animation: stepIn 0.45s ease forwards;
  }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 36px 24px 28px; }
    .invite-digit { width: 40px; height: 48px; font-size: 1.2rem; }
    .title { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<div class="glow-bg">
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
</div>
<div class="dot-grid"></div>

<div class="container">
  <div class="card" id="card">

    <!-- ====== 邀请码 ====== -->
    <div id="stepInvite" class="step-enter">
      <div class="brand">STUDY ROOM</div>
      <div class="title">内测邀请</div>
      <div class="subtitle">自习室正在小范围测试中<br>输入邀请码，加入我们</div>

      <div class="invite-code-row" id="inviteDigits">
        <input type="text" class="invite-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0">
        <input type="text" class="invite-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1">
        <input type="text" class="invite-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
        <input type="text" class="invite-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
        <input type="text" class="invite-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">
      </div>

      <div class="field-error" id="inviteErr">邀请码不正确</div>
      <button class="btn" onclick="submitInvite()">进入自习室</button>
      <div class="invite-hint">INVITATION ONLY</div>
    </div>

    <!-- ====== 登录 ====== -->
    <div id="stepLogin" style="display:none;" class="step-enter">
      <div class="brand">WELCOME BACK</div>
      <div class="title">登录</div>
      <div class="subtitle">欢迎回到自习室</div>
      <div class="field">
        <label class="field-label">账号</label>
        <input type="text" class="field-input" id="loginUser" placeholder="字母 + 数字组成的账号" autocomplete="username">
      </div>
      <div class="field">
        <label class="field-label">密码</label>
        <input type="password" class="field-input" id="loginPass" placeholder="······" autocomplete="current-password">
      </div>
      <div class="field-error" id="loginErr">账号或密码错误</div>
      <div class="field-success" id="loginOk">登录成功，跳转中...</div>
      <button class="btn" onclick="doLogin()">登录</button>
      <span class="switch-link" onclick="showStep('register')">没有账号？注册 →</span>
    </div>

    <!-- ====== 注册 ====== -->
    <div id="stepRegister" style="display:none;" class="step-enter">
      <div class="brand">JOIN US</div>
      <div class="title">创建账号</div>
      <div class="subtitle">账号用于登录，昵称可以随时改</div>
      <div class="field">
        <label class="field-label">账号 · 字母 + 数字</label>
        <input type="text" class="field-input" id="regUser" placeholder="例如 study123，用于登录" maxlength="20" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">昵称 · 展示用</label>
        <input type="text" class="field-input" id="regNick" placeholder="你想起什么名字都可以" maxlength="16" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">邮箱 · 可选</label>
        <input type="email" class="field-input" id="regEmail" placeholder="用于找回密码" autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label">密码</label>
        <input type="password" class="field-input" id="regPass" placeholder="至少 6 位" minlength="6" autocomplete="new-password">
      </div>
      <div class="field">
        <label class="field-label">确认密码</label>
        <input type="password" class="field-input" id="regPass2" placeholder="再输一次" autocomplete="new-password">
      </div>
      <div class="field-error" id="regErr"></div>
      <div class="field-success" id="regOk">注册成功，跳转中...</div>
      <button class="btn" onclick="doRegister()">注册</button>
      <span class="switch-link" onclick="showStep('login')">已有账号？去登录 →</span>
    </div>

  </div>
</div>

<script>
var CODE = '26610';

function loadUsers() {
  try {
    var d = localStorage.getItem('sr_users');
    if (d) {
      var parsed = JSON.parse(d);
      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) return parsed;
    }
  } catch(e) {}
  return {};
}
var users = loadUsers();

function save() { localStorage.setItem('sr_users', JSON.stringify(users)); }

function save() { localStorage.setItem('sr_users', JSON.stringify(users)); }

// ============ 邀请码输入 ============
(function initDigits() {
  var digits = document.querySelectorAll('.invite-digit');
  digits.forEach(function(d, i) {
    d.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
      if (this.value) {
        this.classList.add('filled');
        if (i < digits.length - 1) digits[i + 1].focus();
      } else {
        this.classList.remove('filled');
      }
    });
    d.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) {
        digits[i - 1].focus();
        digits[i - 1].value = '';
        digits[i - 1].classList.remove('filled');
      }
      if (e.key === 'Enter') submitInvite();
    });
    // 粘贴处理
    d.addEventListener('paste', function(e) {
      e.preventDefault();
      var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 5);
      paste.split('').forEach(function(c, j) {
        if (digits[j]) { digits[j].value = c; digits[j].classList.add('filled'); }
      });
      var focusIdx = Math.min(paste.length, 4);
      digits[focusIdx].focus();
    });
  });
})();

function getInviteCode() {
  var code = '';
  document.querySelectorAll('.invite-digit').forEach(function(d) { code += d.value; });
  return code;
}

function submitInvite() {
  var code = getInviteCode();
  var err = document.getElementById('inviteErr');
  if (code === CODE) {
    err.classList.remove('show');
    if (Object.keys(users).length > 0) {
      showStep('login');
    } else {
      showStep('register');
    }
  } else {
    err.classList.add('show');
    document.querySelectorAll('.invite-digit').forEach(function(d, i) {
      d.value = ''; d.classList.remove('filled');
    });
    document.querySelector('.invite-digit').focus();
  }
}

// ============ 步骤切换 ============
function showStep(step) {
  ['stepInvite','stepLogin','stepRegister'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.display = (id === ('step' + step.charAt(0).toUpperCase() + step.slice(1))) ? '' : 'none';
    if (el.style.display === '') { el.classList.remove('step-enter'); void el.offsetWidth; el.classList.add('step-enter'); }
  });
  document.querySelectorAll('.field-error,.field-success').forEach(function(e) { e.classList.remove('show'); });
}

// ============ 注册 ============
function doRegister() {
  var u = document.getElementById('regUser').value.trim();
  var n = document.getElementById('regNick').value.trim();
  var e = document.getElementById('regEmail').value.trim();
  var p = document.getElementById('regPass').value;
  var p2 = document.getElementById('regPass2').value;
  var err = document.getElementById('regErr');

  if (!u) { err.textContent = '请输入账号'; err.classList.add('show'); return; }
  if (!/^[a-zA-Z0-9]+$/.test(u)) { err.textContent = '账号只能包含字母和数字'; err.classList.add('show'); return; }
  if (u.length < 3) { err.textContent = '账号至少 3 个字符'; err.classList.add('show'); return; }
  if (users[u]) { err.textContent = '该账号已被注册'; err.classList.add('show'); return; }
  if (!n) { err.textContent = '请输入昵称'; err.classList.add('show'); return; }
  if (p.length < 6) { err.textContent = '密码至少 6 位'; err.classList.add('show'); return; }
  if (p !== p2) { err.textContent = '两次密码不一致'; err.classList.add('show'); return; }

  users[u] = { password: p, nickname: n, email: e, createdAt: new Date().toISOString() };
  save();
  localStorage.setItem('sr_current_user', JSON.stringify({ username: u, nickname: n }));
  document.getElementById('regOk').classList.add('show');
  setTimeout(function() { window.location.href = 'index.html'; }, 800);
}

// ============ 登录 ============
function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var err = document.getElementById('loginErr');

  if (!u || !p) { err.textContent = '请填写完整'; err.classList.add('show'); return; }
  var user = users[u];
  if (!user || user.password !== p) { err.textContent = '账号或密码错误'; err.classList.add('show'); return; }

  localStorage.setItem('sr_current_user', JSON.stringify({ username: u, nickname: user.nickname || u }));
  document.getElementById('loginOk').classList.add('show');
  setTimeout(function() { window.location.href = 'index.html'; }, 800);
}

// 回车提交
['loginUser','loginPass'].forEach(function(id) {
  document.getElementById(id).addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
});
['regUser','regEmail','regPass','regPass2'].forEach(function(id) {
  document.getElementById(id).addEventListener('keydown', function(e) { if (e.key === 'Enter') doRegister(); });
});
</script>
</body>
</html>
